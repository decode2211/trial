name: fraud_detection
version: "1.0.0"
description: "Financial fraud detection environment where an agent issues SQL queries to identify fraudulent transactions."
author: "Fraud Detection OpenEnv Team"
license: "MIT"
tags:
  - fraud-detection
  - sql
  - financial
  - reinforcement-learning
action_space:
  type: text
  description: "A raw SQL SELECT query string targeting the fraud SQLite database."
  constraints:
    max_length: 500
    allowed_operations: ["SELECT"]
observation_space:
  type: object
  properties:
    sql_result:
      type: string
      description: "Serialized result of the last SQL query."
      max_length: 1000
    fraud_signals:
      type: array
      items: {type: integer}
      minItems: 10
      maxItems: 10
      description: "Binary indicators for fraud detection patterns."
    step_count:
      type: integer
      minimum: 0
      maximum: 50
      description: "Current step number in the episode."
reward_range:
  min: -1.0
  max: 1.0
episode_length:
  max: 50
tasks:
  - name: "EASY"
    description: "Find all transactions above $10,000 in the last 30 days"
    difficulty: 1
  - name: "MEDIUM"
    description: "Identify accounts with >3 failed logins AND a transaction spike"
    difficulty: 2
  - name: "HARD"
    description: "Reconstruct a layering fraud chain across 5 hops of transfers"
    difficulty: 3
entrypoint: "fraud_detection/envs/core_env.py:FraudEnv"